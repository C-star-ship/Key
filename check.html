<!DOCTYPE html>
<html>
<body>

<pre id="result">checking...</pre>

<script>

async function sha256(text){

const encoder = new TextEncoder();
const data = encoder.encode(text);

const hash = await crypto.subtle.digest("SHA-256", data);

return Array.from(new Uint8Array(hash))
.map(b => b.toString(16).padStart(2,'0'))
.join('');

}

async function check(){

const params = new URLSearchParams(location.search);
const key = params.get("key");

let result = {status:"invalid"};

const SECRET="H-TOOL-PRIVATE";

/* tạo key free */

let d=new Date();

let date=
d.getFullYear()+
String(d.getMonth()+1).padStart(2,'0')+
String(d.getDate()).padStart(2,'0');

let hash=await sha256(SECRET+date);

let free="FREE-"+hash.slice(0,8).toUpperCase();

if(key==free){

result={
status:"valid",
type:"free"
};

}

/* check VIP */

let vip=await fetch("vip.json").then(r=>r.json());

if(vip[key]){

let now=new Date();
let exp=new Date(vip[key]);

if(now<=exp){

result={
status:"valid",
type:"vip",
expire:vip[key]
};

}

}

document.getElementById("result").innerText=
JSON.stringify(result);

}

check();

</script>

</body>
</html>
