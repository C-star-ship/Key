<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>H-TOOL VIP</title>

<style>

body{
background:black;
color:#00ff9f;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
border:1px solid #00ff9f;
padding:30px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
background:black;
color:#00ff9f;
border:1px solid #00ff9f;
}

button{
margin-top:10px;
width:100%;
padding:10px;
background:black;
color:#00ff9f;
border:1px solid #00ff9f;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>VIP LOGIN</h2>

<input id="key" placeholder="Nhập key VIP">

<button onclick="check()">CHECK</button>

<p id="result"></p>

</div>

<script>

async function check(){

let key = document.getElementById("key").value;

let r = await fetch("check.js?key="+key);

let data = await r.json();

if(data.status=="valid"){

document.getElementById("result").innerText =
"VIP ACTIVE tới "+data.expire;

}else{

document.getElementById("result").innerText =
"KEY KHÔNG HỢP LỆ";

}

}

</script>

</body>
</html>
