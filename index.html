<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XWORLD - Nhận Key Free</title>
    <style>  
        *{  
            margin:0;  
            padding:0;  
            box-sizing:border-box;  
            font-family:Arial, sans-serif;  
        }  
        
        body {
            background-color: black;
            color: white;
        }

        .fullscreen{  
            position:fixed;  
            top:0;  
            left:0;  
            width:100%;  
            height:100%;  
            display:flex;  
            justify-content:center;  
            align-items:center;  
            overflow:hidden;  
            z-index:9999;  
        }  
        
        /* matrix canvas */  
        canvas{  
            position:absolute;  
            top:0;  
            left:0;  
            z-index: 1;
        }  
        
        /* card */  
        .card{  
            position:relative;  
            z-index:2;  
            background:rgba(0,0,0,0.8);  
            backdrop-filter:blur(10px);  
            border:1px solid rgba(0,255,255,0.3);  
            padding:40px;  
            border-radius:20px;  
            text-align:center;  
            width:350px;  
            box-shadow:0 0 25px cyan;  
        }  
        
        /* title */  
        .title{  
            font-size:28px;  
            color:#00ffff;  
            margin-bottom:10px;  
            font-weight: bold;
        }  
        
        /* desc */  
        .desc{  
            color:#ccc;  
            margin-bottom:20px;  
            font-size: 14px;
        }  
        
        /* device box */  
        .device{  
            font-size:14px;  
            margin-bottom:20px;  
            word-break:break-all;  
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-weight: bold;
        }  
        
        /* button */  
        .btn{  
            padding:14px 30px;  
            border:none;  
            border-radius:10px;  
            font-weight:bold;  
            background:#00ffff;  
            color:black;  
            cursor:pointer;  
            transition:0.3s;  
            width: 100%;
            font-size: 15px;
        }  
        
        .btn:hover{  
            transform:scale(1.05);  
            box-shadow:0 0 15px cyan;  
        }  
        
        /* key box */  
        .keybox{  
            margin-top:20px;  
            background:#111;  
            padding:15px;  
            border-radius:10px;  
            font-size:18px;  
            font-weight: bold;
            color: #0f0;
            word-break:break-all;  
            letter-spacing: 2px;
        }  
        
        /* copy */  
        .copy{  
            margin-top:15px;  
            background:#ff9800;  
            color:white;  
        }  
        
        .copy:hover{
            box-shadow:0 0 15px #ff9800;  
        }
        
        /* loading */  
        .loader{  
            margin-top:15px;  
            display:none;  
        }  
        
        .loader span{  
            display:inline-block;  
            width:8px;  
            height:8px;  
            background:white;  
            border-radius:50%;  
            animation:load 1s infinite;  
            margin: 0 3px;
        }  
        
        .loader span:nth-child(2){animation-delay:.2s}  
        .loader span:nth-child(3){animation-delay:.4s}  
        
        @keyframes load{  
            0%{opacity:0}  
            50%{opacity:1}  
            100%{opacity:0}  
        }  
    </style>
</head>
<body>

<div class="fullscreen">  
    <canvas id="matrix"></canvas>
    <div class="card">  
        <div class="title">🔐 XWORLD KEY</div>  
        <div class="desc">Hệ thống tạo Key Free tự động</div>  
        
        <div class="device" id="device">Đang kiểm tra mã máy...</div>  
        
        <button class="btn" onclick="generateKey()">LẤY KEY FREE</button>  
        
        <div class="loader" id="loader">  
            <span></span>  
            <span></span>  
            <span></span>  
        </div>  
        
        <div class="keybox" id="keybox">Chưa tạo key</div>  
        
        <button class="btn copy" onclick="copyKey()">COPY KEY</button>  
    </div>  
</div>  

<script>  
    /* --- MATRIX EFFECT --- */  
    const canvas = document.getElementById("matrix");  
    const ctx = canvas.getContext("2d");  
    canvas.height = window.innerHeight;  
    canvas.width = window.innerWidth;  
    
    const letters = "01";  
    const fontSize = 14;  
    const columns = canvas.width / fontSize;  
    const drops = [];  
    
    for(let x=0; x<columns; x++) drops[x] = 1;  
    
    function draw(){  
        ctx.fillStyle = "rgba(0,0,0,0.05)";  
        ctx.fillRect(0,0,canvas.width,canvas.height);  
        
        ctx.fillStyle = "#0f0";  
        ctx.font = fontSize + "px monospace";  
        
        for(let i=0; i<drops.length; i++){  
            const text = letters.charAt(Math.floor(Math.random() * letters.length));  
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);  
            
            if(drops[i] * fontSize > canvas.height && Math.random() > 0.975)  
                drops[i] = 0;  
            
            drops[i]++;  
        }  
    }  
    setInterval(draw, 33);  
    
    /* --- LẤY DEVICE ID TỪ LINK --- */  
    function getDeviceIDFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }

    let currentDeviceID = getDeviceIDFromURL();
    let deviceBox = document.getElementById("device");

    if(currentDeviceID) {
        deviceBox.innerText = "Mã máy: " + currentDeviceID;
        deviceBox.style.color = "#0f0"; 
    } else {
        deviceBox.innerText = "⚠️ Không tìm thấy Mã máy! Vui lòng mở web qua link trong Tool.";
        deviceBox.style.color = "#ff4444"; 
    }
    
    /* --- SHA256 HASH --- */  
    async function sha256(text){  
        const msgBuffer = new TextEncoder().encode(text);  
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);  
        const hashArray = Array.from(new Uint8Array(hashBuffer));  
        return hashArray.map(b => b.toString(16).padStart(2,"0")).join("");  
    }  
    
    /* --- GENERATE FREE KEY --- */  
    async function generateKey(){  
        if(!currentDeviceID) {
            alert("Lỗi: Không có mã máy! Bạn phải chạy file Python để lấy link đúng.");
            return;
        }

        let loader = document.getElementById("loader");  
        let keybox = document.getElementById("keybox");
        
        loader.style.display = "block";  
        keybox.innerText = "Đang xử lý...";
        
        await new Promise(r => setTimeout(r, 1500));  
        
        /* SECRET CỐ ĐỊNH CHO KEY FREE */  
        let secret = "XWORLD_TOOL";  
        
        let raw = currentDeviceID + "-" + secret;  
        let key = await sha256(raw);  
        key = key.substring(0, 16).toUpperCase();  
        
        loader.style.display = "none";  
        keybox.innerText = key;  
    }  
    
    /* --- COPY KEY --- */  
    function copyKey(){  
        let key = document.getElementById("keybox").innerText;  
        
        if(key === "Chưa tạo key" || key === "Đang xử lý..."){
            alert("Vui lòng bấm LẤY KEY FREE trước!");
            return;
        }
        
        navigator.clipboard.writeText(key).then(() => {
            alert("Đã copy key thành công: " + key);
        }).catch(err => {
            alert("Lỗi copy. Vui lòng copy thủ công!");
        });
    }  
</script>
</body>
</html>
