<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>H-TOOL KEY SYSTEM</title>

<style>

body{
background:black;
color:#00ff9f;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
border:1px solid #00ff9f;
padding:30px;
width:350px;
text-align:center;
box-shadow:0 0 20px #00ff9f;
}

.title{
font-size:22px;
margin-bottom:10px;
}

.btn{

background:black;
color:#00ff9f;
border:1px solid #00ff9f;
padding:10px;
cursor:pointer;
width:100%;
margin-top:10px;

}

.btn:hover{

background:#00ff9f;
color:black;

}

.keybox{

margin-top:20px;
font-size:18px;
word-break:break-all;

}

.copy{

margin-top:10px;
font-size:12px;
cursor:pointer;

}

.timer{

margin-top:15px;
font-size:12px;
color:#aaa;

}

</style>

</head>

<body>

<div class="box">

<div class="title">
H-TOOL FREE KEY
</div>

<button class="btn" onclick="getKey()">
GET KEY
</button>

<div class="keybox" id="key">
WAITING...
</div>

<div class="copy" onclick="copyKey()">
COPY KEY
</div>

<div class="timer" id="timer">
KEY RESET: ...
</div>

</div>

<script>

/* SHA256 */

async function sha256(text){

const encoder = new TextEncoder();
const data = encoder.encode(text);

const hash = await crypto.subtle.digest("SHA-256", data);

return Array.from(new Uint8Array(hash))
.map(b => b.toString(16).padStart(2,'0'))
.join('');

}

/* tạo key */

async function getKey(){

let d = new Date();

let date =
d.getFullYear() +
String(d.getMonth()+1).padStart(2,'0') +
String(d.getDate()).padStart(2,'0');

/* secret ẩn */

let secret = btoa("H-TOOL-PRIVATE");

let hash = await sha256(secret + date);

let key = "FREE-" + hash.substring(0,8).toUpperCase();

document.getElementById("key").innerText = key;

}

/* copy */

function copyKey(){

let text = document.getElementById("key").innerText;

navigator.clipboard.writeText(text);

alert("Copied: "+text);

}

/* timer reset */

function updateTimer(){

let now = new Date();

let tomorrow = new Date();
tomorrow.setHours(24,0,0,0);

let diff = tomorrow-now;

let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60)%60;
let s = Math.floor(diff/1000)%60;

document.getElementById("timer").innerText =
"KEY RESET IN: "+h+"h "+m+"m "+s+"s";

}

setInterval(updateTimer,1000);

</script>

</body>
</html>
